<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Pocket RSS</title>
<style>
:root {
  --bg: #f7f5f0;
  --surface: #ffffff;
  --text: #2a2a2a;
  --muted: #8a8a8a;
  --border: #e6e2d8;
  --accent: #c8553d;
  --accent-soft: #f4d8d0;
  --read: #b5b0a4;
  --shadow: 0 1px 3px rgba(0,0,0,0.04);
}
[data-theme="dark"] {
  --bg: #1a1a1a;
  --surface: #242424;
  --text: #e8e6e0;
  --muted: #888;
  --border: #333;
  --accent: #e07b5f;
  --accent-soft: #3a2620;
  --read: #555;
  --shadow: 0 1px 3px rgba(0,0,0,0.3);
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  margin: 0; padding: 0;
  font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif;
  font-size: 15px;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
body {
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
  min-height: 100vh;
}
header {
  position: sticky; top: 0; z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
  padding-top: calc(12px + env(safe-area-inset-top));
}
header h1 {
  margin: 0; font-size: 17px; font-weight: 600;
  letter-spacing: 0.02em;
}
.icon-btn {
  background: none; border: none; padding: 8px;
  color: var(--text); cursor: pointer; font-size: 18px;
  border-radius: 8px;
}
.icon-btn:active { background: var(--accent-soft); }
.tabs {
  display: flex; background: var(--surface);
  border-bottom: 1px solid var(--border);
  overflow-x: auto; scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex: 0 0 auto; padding: 10px 16px;
  font-size: 13px; color: var(--muted);
  border: none; background: none;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
.toolbar {
  display: flex; gap: 8px; padding: 10px 16px;
  background: var(--surface); border-bottom: 1px solid var(--border);
}
.search-input {
  flex: 1; padding: 8px 12px; font-size: 14px;
  border: 1px solid var(--border); border-radius: 20px;
  background: var(--bg); color: var(--text);
}
.search-input:focus { outline: none; border-color: var(--accent); }
main { padding: 0 0 80px 0; }
.feed-list, .article-list { list-style: none; margin: 0; padding: 0; }
.article-item {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px;
  display: flex; gap: 12px;
  cursor: pointer;
  transition: background 0.15s;
}
.article-item:active { background: var(--accent-soft); }
.article-item.read .article-title { color: var(--read); font-weight: 400; }
.article-thumb {
  flex: 0 0 80px; width: 80px; height: 80px;
  border-radius: 8px; overflow: hidden;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.article-thumb img {
  width: 100%; height: 100%; object-fit: cover;
  display: block;
}
.article-thumb.no-img::after {
  content: '📰';
  font-size: 28px; opacity: 0.3;
}
.article-body { flex: 1; min-width: 0; }
.article-meta {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px; color: var(--muted); margin-bottom: 4px;
}
.feed-tag {
  background: var(--accent-soft); color: var(--accent);
  padding: 2px 8px; border-radius: 10px;
  font-size: 10px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 120px;
}
.article-title {
  font-size: 14px; font-weight: 600; line-height: 1.4;
  margin: 0 0 4px 0; color: var(--text);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.article-desc {
  font-size: 12px; color: var(--muted); line-height: 1.4;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.article-actions {
  display: flex; gap: 12px; margin-top: 8px;
  font-size: 11px; color: var(--muted);
}
.article-actions button {
  background: none; border: none; color: var(--muted);
  font-size: 11px; padding: 0;
}
.article-actions .star.active { color: var(--accent); }
.feed-item {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--surface);
  padding: 12px 16px; border-bottom: 1px solid var(--border);
}
.feed-info { flex: 1; min-width: 0; }
.feed-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.feed-url { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.feed-cat {
  font-size: 10px; color: var(--accent);
  background: var(--accent-soft);
  padding: 2px 8px; border-radius: 8px; margin-right: 8px;
}
.fab {
  position: fixed; right: 20px;
  bottom: calc(20px + env(safe-area-inset-bottom));
  width: 52px; height: 52px; border-radius: 50%;
  background: var(--accent); color: white;
  border: none; font-size: 24px;
  box-shadow: 0 4px 12px rgba(200,85,61,0.4);
  z-index: 50;
}
.modal-bg {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  z-index: 200; display: none; align-items: flex-end; justify-content: center;
}
.modal-bg.active { display: flex; }
.modal {
  background: var(--surface); width: 100%;
  border-radius: 16px 16px 0 0;
  padding: 20px 16px calc(20px + env(safe-area-inset-bottom));
  max-height: 85vh; overflow-y: auto;
}
.modal h2 { margin: 0 0 16px; font-size: 16px; }
.modal label { display: block; font-size: 12px; color: var(--muted); margin: 12px 0 4px; }
.modal input, .modal select, .modal textarea {
  width: 100%; padding: 10px; font-size: 14px;
  border: 1px solid var(--border); border-radius: 8px;
  background: var(--bg); color: var(--text);
  font-family: inherit;
}
.modal-actions { display: flex; gap: 8px; margin-top: 20px; }
.btn {
  flex: 1; padding: 12px; border-radius: 8px;
  font-size: 14px; font-weight: 600; border: none;
}
.btn-primary { background: var(--accent); color: white; }
.btn-secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
.btn-danger { background: #d32f2f; color: white; }
.empty {
  text-align: center; padding: 60px 20px; color: var(--muted);
  font-size: 13px; line-height: 1.6;
}
.loading { text-align: center; padding: 30px; color: var(--muted); font-size: 12px; }
.detail-view {
  position: fixed; inset: 0; z-index: 150;
  background: var(--surface); overflow-y: auto;
  display: none; flex-direction: column;
}
.detail-view.active { display: flex; }
.detail-header {
  position: sticky; top: 0; background: var(--surface);
  padding: 12px 16px; border-bottom: 1px solid var(--border);
  padding-top: calc(12px + env(safe-area-inset-top));
  display: flex; align-items: center; gap: 8px;
}
.detail-content { padding: 16px; line-height: 1.7; }
.detail-content h2 { font-size: 18px; margin: 0 0 12px; line-height: 1.4; }
.detail-content .detail-meta { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
.detail-content .detail-body { font-size: 14px; }
.detail-content .detail-body img { max-width: 100%; height: auto; border-radius: 8px; margin: 8px 0; }
.detail-content a { color: var(--accent); }
.snackbar {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
  background: var(--text); color: var(--bg);
  padding: 10px 20px; border-radius: 20px;
  font-size: 13px; z-index: 300;
  opacity: 0; transition: opacity 0.3s;
}
.snackbar.show { opacity: 1; }
</style>
</head>
<body data-theme="light">

<header>
  <h1>Pocket RSS</h1>
  <div>
    <button class="icon-btn" id="btnTheme" aria-label="テーマ切替">◐</button>
    <button class="icon-btn" id="btnMenu" aria-label="メニュー">≡</button>
  </div>
</header>

<div class="tabs" id="tabs">
  <button class="tab active" data-cat="__all__">すべて</button>
  <button class="tab" data-cat="__unread__">未読</button>
  <button class="tab" data-cat="__star__">★お気に入り</button>
  <button class="tab" data-cat="__feeds__">購読管理</button>
</div>

<div class="toolbar">
  <input type="search" class="search-input" id="searchInput" placeholder="記事を検索...">
  <button class="icon-btn" id="btnRefresh" aria-label="更新">↻</button>
</div>

<main id="main"></main>

<button class="fab" id="btnAddFeed" aria-label="フィード追加">+</button>

<div class="modal-bg" id="modalAdd">
  <div class="modal">
    <h2>フィードを追加</h2>
    <label>RSS/Atom の URL</label>
    <input type="url" id="inputUrl" placeholder="https://example.com/feed.xml">
    <label>カテゴリ</label>
    <input type="text" id="inputCat" placeholder="ニュース / 技術 など">
    <div class="modal-actions">
      <button class="btn btn-secondary" data-close>キャンセル</button>
      <button class="btn btn-primary" id="btnSaveFeed">追加</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="modalMenu">
  <div class="modal">
    <h2>メニュー</h2>
    <button class="btn btn-secondary" id="btnExportOPML" style="margin-bottom:8px">OPMLエクスポート</button>
    <button class="btn btn-secondary" id="btnImportOPML" style="margin-bottom:8px">OPMLインポート</button>
    <input type="file" id="fileOPML" accept=".opml,.xml" style="display:none">
    <button class="btn btn-secondary" id="btnMarkAllRead" style="margin-bottom:8px">全て既読にする</button>
    <button class="btn btn-secondary" id="btnClearCache" style="margin-bottom:8px">記事キャッシュ削除</button>
    <button class="btn btn-danger" id="btnReset">全データ初期化</button>
    <div class="modal-actions">
      <button class="btn btn-secondary" data-close>閉じる</button>
    </div>
  </div>
</div>

<div class="detail-view" id="detailView">
  <div class="detail-header">
    <button class="icon-btn" id="btnBack">←</button>
    <div style="flex:1; font-size:13px; color:var(--muted);" id="detailFeedName"></div>
    <button class="icon-btn" id="btnOpenLink">↗</button>
  </div>
  <div class="detail-content" id="detailContent"></div>
</div>

<div class="snackbar" id="snackbar"></div>

<script>
'use strict';

const STATE = {
  feeds: [],
  articles: [],
  view: '__all__',
  query: '',
  currentArticle: null
};

const PROXY = 'https://api.allorigins.win/raw?url=';

const STORAGE_KEY = 'pocket_rss_v1';

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      STATE.feeds = data.feeds || [];
      STATE.articles = data.articles || [];
      document.body.dataset.theme = data.theme || 'light';
    } else {
      STATE.feeds = [
        { id: uid(), url: 'https://www.publickey1.jp/atom.xml', name: 'Publickey', category: '技術' },
        { id: uid(), url: 'https://gigazine.net/news/rss_2.0/', name: 'GIGAZINE', category: 'ニュース' }
      ];
      save();
    }
  } catch(e) { console.error(e); }
}
function save() {
  const data = {
    feeds: STATE.feeds,
    articles: STATE.articles.slice(0, 500),
    theme: document.body.dataset.theme
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}
function uid() { return Math.random().toString(36).slice(2, 10); }

// ===== 画像URL抽出 =====
function extractImage(item, isAtom) {
  // 1. media:thumbnail / media:content
  const mediaThumb = item.getElementsByTagNameNS('*', 'thumbnail')[0];
  if (mediaThumb) {
    const url = mediaThumb.getAttribute('url') || mediaThumb.textContent?.trim();
    if (url) return url;
  }
  const mediaContent = item.getElementsByTagNameNS('*', 'content');
  for (const mc of mediaContent) {
    const type = mc.getAttribute('type') || '';
    const medium = mc.getAttribute('medium') || '';
    if (type.startsWith('image') || medium === 'image') {
      const url = mc.getAttribute('url');
      if (url) return url;
    }
  }
  // 2. enclosure
  const enclosures = item.querySelectorAll('enclosure');
  for (const enc of enclosures) {
    const type = enc.getAttribute('type') || '';
    if (type.startsWith('image')) {
      const url = enc.getAttribute('url');
      if (url) return url;
    }
  }
  // 3. itunes:image
  const itunesImg = item.getElementsByTagNameNS('*', 'image')[0];
  if (itunesImg) {
    const url = itunesImg.getAttribute('href');
    if (url) return url;
  }
  // 4. content:encoded や description / summary 内の img
  const contentNodes = [
    ...item.getElementsByTagNameNS('*', 'encoded'),
    ...(isAtom ? item.querySelectorAll('content, summary') : item.querySelectorAll('description'))
  ];
  for (const node of contentNodes) {
    const html = node.textContent || '';
    const m = html.match(/<img[^>]+src=["']([^"']+)["']/i);
    if (m && m[1]) return m[1];
  }
  // 5. Atom の link rel="enclosure"
  if (isAtom) {
    const links = item.querySelectorAll('link[rel="enclosure"]');
    for (const l of links) {
      const type = l.getAttribute('type') || '';
      if (type.startsWith('image')) {
        const url = l.getAttribute('href');
        if (url) return url;
      }
    }
  }
  return '';
}

async function fetchFeed(feed) {
  const url = PROXY + encodeURIComponent(feed.url);
  const res = await fetch(url);
  if (!res.ok) throw new Error('取得失敗: ' + feed.name);
  const text = await res.text();
  const parser = new DOMParser();
  const doc = parser.parseFromString(text, 'application/xml');

  const isAtom = !!doc.querySelector('feed > entry');
  const itemNodes = isAtom ? doc.querySelectorAll('entry') : doc.querySelectorAll('item');

  const items = [...itemNodes].map(it => {
    const title = it.querySelector('title')?.textContent?.trim() || '(無題)';
    let link = '';
    if (isAtom) {
      const linkEl = [...it.querySelectorAll('link')].find(l => !l.getAttribute('rel') || l.getAttribute('rel') === 'alternate');
      link = linkEl?.getAttribute('href') || '';
    } else {
      link = it.querySelector('link')?.textContent?.trim() || '';
    }
    const descRaw = isAtom
      ? (it.querySelector('summary')?.textContent || it.querySelector('content')?.textContent || '')
      : (it.querySelector('description')?.textContent || '');
    const bodyRaw = isAtom
      ? (it.querySelector('content')?.textContent || it.querySelector('summary')?.textContent || '')
      : (it.getElementsByTagNameNS('*', 'encoded')[0]?.textContent || it.querySelector('description')?.textContent || '');
    const pubDate = isAtom
      ? (it.querySelector('updated')?.textContent || it.querySelector('published')?.textContent || '')
      : (it.querySelector('pubDate')?.textContent || '');
    const image = extractImage(it, isAtom);

    return { title, link, desc: stripHtml(descRaw).slice(0, 200), body: bodyRaw, pubDate, image };
  });

  const channelTitle = doc.querySelector('channel > title, feed > title')?.textContent?.trim();
  if (channelTitle && !feed.name) feed.name = channelTitle;

  return items.map(it => ({
    id: hashId(feed.id + it.link + it.title),
    feedId: feed.id,
    title: it.title,
    link: it.link,
    desc: it.desc,
    body: it.body,
    pubDate: it.pubDate,
    image: it.image,
    read: false,
    star: false
  }));
}

function stripHtml(s) {
  const d = document.createElement('div');
  d.innerHTML = s;
  return d.textContent || '';
}
function hashId(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = ((h<<5)-h + s.charCodeAt(i)) | 0;
  return 'a' + Math.abs(h).toString(36);
}

async function refreshAll() {
  showSnack('更新中...');
  let newCount = 0;
  for (const feed of STATE.feeds) {
    try {
      const items = await fetchFeed(feed);
      for (const item of items) {
        const existing = STATE.articles.find(a => a.id === item.id);
        if (!existing) {
          STATE.articles.unshift(item);
          newCount++;
        } else if (!existing.image && item.image) {
          existing.image = item.image;
        }
      }
    } catch (e) {
      console.warn(e);
    }
  }
  STATE.articles.sort((a,b) => new Date(b.pubDate||0) - new Date(a.pubDate||0));
  save();
  render();
  showSnack(newCount > 0 ? `新着 ${newCount} 件` : '更新完了');
}

function render() {
  const main = document.getElementById('main');

  if (STATE.view === '__feeds__') {
    main.innerHTML = renderFeeds();
    bindFeedEvents();
    return;
  }

  let articles = STATE.articles.slice();
  if (STATE.view === '__unread__') articles = articles.filter(a => !a.read);
  else if (STATE.view === '__star__') articles = articles.filter(a => a.star);
  else if (STATE.view !== '__all__') articles = articles.filter(a => {
    const f = STATE.feeds.find(f => f.id === a.feedId);
    return f && f.category === STATE.view;
  });
  if (STATE.query) {
    const q = STATE.query.toLowerCase();
    articles = articles.filter(a => a.title.toLowerCase().includes(q) || a.desc.toLowerCase().includes(q));
  }

  if (articles.length === 0) {
    main.innerHTML = `<div class="empty">記事がありません<br>「+」ボタンからフィードを追加するか<br>↻ で更新してください</div>`;
    return;
  }

  main.innerHTML = '<ul class="article-list">' + articles.map(a => {
    const feed = STATE.feeds.find(f => f.id === a.feedId);
    const date = a.pubDate ? new Date(a.pubDate).toLocaleDateString('ja-JP', {month:'numeric', day:'numeric'}) : '';
    const thumb = a.image
      ? `<div class="article-thumb"><img src="${escapeAttr(a.image)}" alt="" loading="lazy" onerror="this.parentElement.classList.add('no-img');this.remove();"></div>`
      : `<div class="article-thumb no-img"></div>`;
    return `
      <li class="article-item ${a.read?'read':''}" data-id="${a.id}">
        ${thumb}
        <div class="article-body">
          <div class="article-meta">
            <span class="feed-tag">${escapeHtml(feed?.name || '?')}</span>
            <span>${date}</span>
          </div>
          <div class="article-title">${escapeHtml(a.title)}</div>
          <div class="article-desc">${escapeHtml(a.desc)}</div>
          <div class="article-actions">
            <button class="star ${a.star?'active':''}" data-act="star" data-id="${a.id}">★</button>
            <button data-act="read" data-id="${a.id}">${a.read?'未読に':'既読に'}</button>
          </div>
        </div>
      </li>`;
  }).join('') + '</ul>';

  bindArticleEvents();
}

function renderFeeds() {
  if (STATE.feeds.length === 0) {
    return `<div class="empty">購読中のフィードはありません</div>`;
  }
  return '<ul class="feed-list">' + STATE.feeds.map(f => `
    <li class="feed-item">
      <div class="feed-info">
        <div class="feed-name">${escapeHtml(f.name||f.url)}</div>
        <div class="feed-url">${escapeHtml(f.url)}</div>
      </div>
      <span class="feed-cat">${escapeHtml(f.category||'未分類')}</span>
      <button class="icon-btn" data-del="${f.id}" style="color:#d32f2f">×</button>
    </li>
  `).join('') + '</ul>';
}

function escapeHtml(s) {
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s) { return escapeHtml(s); }

function renderTabs() {
  const cats = [...new Set(STATE.feeds.map(f => f.category).filter(Boolean))];
  const tabs = document.getElementById('tabs');
  const fixed = ['__all__','__unread__','__star__'];
  const labels = {'__all__':'すべて','__unread__':'未読','__star__':'★お気に入り','__feeds__':'購読管理'};
  let html = '';
  for (const k of fixed) {
    html += `<button class="tab ${STATE.view===k?'active':''}" data-cat="${k}">${labels[k]}</button>`;
  }
  for (const c of cats) {
    html += `<button class="tab ${STATE.view===c?'active':''}" data-cat="${c}">${escapeHtml(c)}</button>`;
  }
  html += `<button class="tab ${STATE.view==='__feeds__'?'active':''}" data-cat="__feeds__">購読管理</button>`;
  tabs.innerHTML = html;
  tabs.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
    STATE.view = t.dataset.cat;
    renderTabs(); render();
  }));
}

function bindArticleEvents() {
  document.querySelectorAll('.article-item').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.closest('button')) return;
      openDetail(el.dataset.id);
    });
  });
  document.querySelectorAll('[data-act]').forEach(b => {
    b.addEventListener('click', (e) => {
      e.stopPropagation();
      const a = STATE.articles.find(x => x.id === b.dataset.id);
      if (!a) return;
      if (b.dataset.act === 'star') a.star = !a.star;
      else if (b.dataset.act === 'read') a.read = !a.read;
      save(); render();
    });
  });
}
function bindFeedEvents() {
  document.querySelectorAll('[data-del]').forEach(b => {
    b.addEventListener('click', () => {
      const id = b.dataset.del;
      if (!confirm('このフィードを削除しますか？')) return;
      STATE.feeds = STATE.feeds.filter(f => f.id !== id);
      STATE.articles = STATE.articles.filter(a => a.feedId !== id);
      save(); renderTabs(); render();
    });
  });
}

function openDetail(id) {
  const a = STATE.articles.find(x => x.id === id);
  if (!a) return;
  a.read = true;
  STATE.currentArticle = a;
  const feed = STATE.feeds.find(f => f.id === a.feedId);
  document.getElementById('detailFeedName').textContent = feed?.name || '';
  const heroImg = a.image ? `<img src="${escapeAttr(a.image)}" alt="" style="width:100%;border-radius:8px;margin-bottom:12px" onerror="this.remove()">` : '';
  document.getElementById('detailContent').innerHTML = `
    ${heroImg}
    <h2>${escapeHtml(a.title)}</h2>
    <div class="detail-meta">${a.pubDate ? new Date(a.pubDate).toLocaleString('ja-JP') : ''}</div>
    <div class="detail-body">${a.body || escapeHtml(a.desc)}</div>
  `;
  document.getElementById('detailView').classList.add('active');
  save();
}

function showSnack(msg) {
  const sn = document.getElementById('snackbar');
  sn.textContent = msg;
  sn.classList.add('show');
  setTimeout(() => sn.classList.remove('show'), 2200);
}

function exportOPML() {
  const xml = `<?xml version="1.0" encoding="UTF-8"?>
<opml version="2.0"><head><title>Pocket RSS Export</title></head><body>
${STATE.feeds.map(f => `<outline type="rss" text="${escapeHtml(f.name||f.url)}" title="${escapeHtml(f.name||f.url)}" xmlUrl="${escapeHtml(f.url)}" category="${escapeHtml(f.category||'')}"/>`).join('\n')}
</body></opml>`;
  const blob = new Blob([xml], {type:'text/xml'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'pocket-rss.opml';
  a.click();
  showSnack('エクスポート完了');
}

function importOPML(text) {
  const doc = new DOMParser().parseFromString(text, 'application/xml');
  const outlines = doc.querySelectorAll('outline[xmlUrl]');
  let added = 0;
  outlines.forEach(o => {
    const url = o.getAttribute('xmlUrl');
    if (!STATE.feeds.find(f => f.url === url)) {
      STATE.feeds.push({
        id: uid(), url,
        name: o.getAttribute('title') || o.getAttribute('text') || url,
        category: o.getAttribute('category') || '未分類'
      });
      added++;
    }
  });
  save(); renderTabs(); render();
  showSnack(`${added}件 追加`);
}

load();
renderTabs();
render();

document.getElementById('btnTheme').addEventListener('click', () => {
  document.body.dataset.theme = document.body.dataset.theme === 'dark' ? 'light' : 'dark';
  save();
});
document.getElementById('btnMenu').addEventListener('click', () => {
  document.getElementById('modalMenu').classList.add('active');
});
document.getElementById('btnRefresh').addEventListener('click', refreshAll);
document.getElementById('btnAddFeed').addEventListener('click', () => {
  document.getElementById('modalAdd').classList.add('active');
});
document.getElementById('searchInput').addEventListener('input', (e) => {
  STATE.query = e.target.value;
  render();
});
document.querySelectorAll('[data-close]').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.modal-bg').forEach(m => m.classList.remove('active'));
  });
});
document.querySelectorAll('.modal-bg').forEach(bg => {
  bg.addEventListener('click', (e) => {
    if (e.target === bg) bg.classList.remove('active');
  });
});

document.getElementById('btnSaveFeed').addEventListener('click', async () => {
  const url = document.getElementById('inputUrl').value.trim();
  const cat = document.getElementById('inputCat').value.trim() || '未分類';
  if (!url) return;
  const feed = { id: uid(), url, name: '', category: cat };
  showSnack('取得中...');
  try {
    const items = await fetchFeed(feed);
    STATE.feeds.push(feed);
    STATE.articles.unshift(...items);
    STATE.articles.sort((a,b) => new Date(b.pubDate||0) - new Date(a.pubDate||0));
    save(); renderTabs(); render();
    document.getElementById('modalAdd').classList.remove('active');
    document.getElementById('inputUrl').value = '';
    document.getElementById('inputCat').value = '';
    showSnack('追加しました');
  } catch (e) {
    showSnack('取得失敗：URLを確認してください');
  }
});

document.getElementById('btnExportOPML').addEventListener('click', exportOPML);
document.getElementById('btnImportOPML').addEventListener('click', () => {
  document.getElementById('fileOPML').click();
});
document.getElementById('fileOPML').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => importOPML(reader.result);
  reader.readAsText(file);
  document.getElementById('modalMenu').classList.remove('active');
});
document.getElementById('btnMarkAllRead').addEventListener('click', () => {
  STATE.articles.forEach(a => a.read = true);
  save(); render();
  document.getElementById('modalMenu').classList.remove('active');
  showSnack('全て既読にしました');
});
document.getElementById('btnClearCache').addEventListener('click', () => {
  if (!confirm('記事キャッシュを削除しますか？')) return;
  STATE.articles = [];
  save(); render();
  document.getElementById('modalMenu').classList.remove('active');
  showSnack('キャッシュを削除しました');
});
document.getElementById('btnReset').addEventListener('click', () => {
  if (!confirm('全データを削除します。よろしいですか？')) return;
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
});

document.getElementById('btnBack').addEventListener('click', () => {
  document.getElementById('detailView').classList.remove('active');
  render();
});
document.getElementById('btnOpenLink').addEventListener('click', () => {
  if (STATE.currentArticle?.link) window.open(STATE.currentArticle.link, '_blank');
});
</script>
</body>
</html>
